href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Montserrat:wght@600;700&display=swap"
rel="stylesheet">

    <body>
        <header >
            <h1>Jàng Afrig </h1>
            <p>Apprendre l'Afrique , un pays à la fois </p>
        </header >
        <nav>
            <a href="index.html">Accueil </a>
            <a href="quiz.html">Jouer </a>
            <a href="scores.html">Mes Scores </a>
            <a href="apropos.html">À propos </a>
            <a href="contact.html">Contactez-nous</a>
        </nav>
        <main>
            <section >
                <h2>Avant de jouer </h2>
                <form>
                <p>
                    <label for="pseudo">Votre pseudo :</label >
                    <input type="text" id="pseudo" name="pseudo"
                    placeholder="Ex. Fatou" required >

                </p>
                <p>
                    <label for="nombre">Nombre de questions</label>
                    <input type="number" name="nombre" id="nombre"  value="10" min="5" max="20">
                </p>
                <p>
                    <label for="Difficulte"></label>
                    <input type="radio" id="Difficulte" name="Difficulte" required>Facile
                    <input type="radio" id="Difficulte" name="Difficulte" required>Moyen
                    <input type="radio" id="Difficulte" name="Difficulte" required>Difficile

                </p>
                <p>
                    <label for="mode">Mode de jeu :</label >
                    <select id="mode" name="mode" required >
                        <option value="">-- Choisir un mode--</option >
                        <option value="capitales">Capitales </option >
                        <option value="drapeaux">Drapeaux </option >
                        <option value="langues">Langues </option >
                        <option value="voisins">Voisins </option >
                        <option value="chrono">Chrono </option >
                    </select >
                </p>
                <p>
                    <button type="submit" class="btn btn-primary">Commencer le quiz </button >
                </p>
                </form>
            </section >
        </main>
        <footer >
            <p>&copy; 2025--2026 Jàng Afrig --- L1 DUT1-Info,ESP/UCAD.
            </p>
        </footer >
